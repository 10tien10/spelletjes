<title>Woordje</title>
<style>
  :root{
    --bg:#0f1420; --panel:#161c2b; --tile:#1f2636; --border:#333c52;
    --text:#eef2f8; --muted:#8a94a8;
    --green:#6aaa64; --yellow:#c9b458; --gray:#3a3f4b;
    --key:#3a4256; --keytext:#eef2f8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
    height:100dvh; overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  header{
    width:100%; max-width:500px; text-align:center; padding:10px 0 6px;
    border-bottom:1px solid var(--border); position:relative;
  }
  header h1{margin:0; font-size:26px; letter-spacing:4px; font-weight:800;}
  header .stats{font-size:12px; color:var(--muted); margin-top:2px;}
  #board{
    flex:1; display:flex; align-items:center; justify-content:center; width:100%;
  }
  .grid{display:grid; grid-template-rows:repeat(6,1fr); gap:6px;}
  .row{display:grid; grid-template-columns:repeat(5,1fr); gap:6px;}
  .tile{
    width:56px; height:56px; max-width:16vw; max-height:16vw;
    display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:700; text-transform:uppercase;
    border:2px solid var(--border); background:var(--tile); border-radius:6px;
    transition:transform .1s;
  }
  .tile.filled{border-color:#586080; animation:pop .1s;}
  .tile.green{background:var(--green); border-color:var(--green); color:#fff;}
  .tile.yellow{background:var(--yellow); border-color:var(--yellow); color:#fff;}
  .tile.gray{background:var(--gray); border-color:var(--gray); color:#fff;}
  @keyframes pop{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}
  .row.shake{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}
  #msg{
    min-height:22px; font-size:14px; color:var(--muted); padding:2px 0 6px; font-weight:600;
  }
  #keyboard{width:100%; max-width:500px; padding:0 4px 8px;}
  .krow{display:flex; justify-content:center; gap:5px; margin-bottom:6px;}
  .key{
    flex:1; min-width:0; height:52px; border:none; border-radius:6px;
    background:var(--key); color:var(--keytext); font-size:15px; font-weight:700;
    text-transform:uppercase; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .key:active{filter:brightness(1.3);}
  .key.wide{flex:1.5; font-size:12px;}
  .key.green{background:var(--green); color:#fff;}
  .key.yellow{background:var(--yellow); color:#fff;}
  .key.gray{background:var(--gray); color:#8a94a8;}
  #overlay{
    position:fixed; inset:0; background:rgba(10,14,22,.85); display:none;
    align-items:center; justify-content:center; z-index:10;
  }
  #overlay.show{display:flex;}
  .card{
    background:var(--panel); border:1px solid var(--border); border-radius:14px;
    padding:24px; text-align:center; max-width:320px; width:86%;
  }
  .card h2{margin:0 0 6px; font-size:22px;}
  .card p{margin:6px 0; color:var(--muted); font-size:15px;}
  .card .answer{font-size:24px; font-weight:800; letter-spacing:3px; text-transform:uppercase; color:var(--text);}
  .btn{
    margin-top:14px; background:var(--green); color:#fff; border:none;
    padding:12px 20px; border-radius:10px; font-size:16px; font-weight:700; cursor:pointer; width:100%;
  }
  .btn:active{filter:brightness(1.1);}
</style>
</head>

, "sleur", "slijm", "slijp", "sloep", "sloot", "sluik", "sluis", "smaak", "smeek", "smeer", "smoel", "snaar", "snert", "snoek", "snoep", "snoer", "sonar", "sorry", "spaak", "spaan", "spaar", "speld", "spelt", "spier", "spijs", "spijt", "spits", "split", "spoed", "spoel", "spons", "spoor", "sport", "sprei", "spuit", "staaf", "staak", "staal", "staan", "staar", "stage", "stand", "stang", "start", "steeg", "steek", "steel", "steen", "steil", "stelt", "stemt", "sterk", "steun", "stier", "stijf", "stijl", "stoel", "stoep", "stomp", "stoof", "stoom", "stoot", "stort", "stout", "straf", "strak", "stram", "stuit", "stunt", "stuur", "suede", "taart", "tabak", "tabel", "tafel", "taken", "talen", "talud", "tante", "teams", "teder", "tegel", "tegen", "teken", "telen", "tempo", "tenen", "tenor", "teren", "terug", "thans", "thema", "thuis", "timer", "titel", "toast", "toets", "tomen", "tonen", "tonic", "toorn", "tosti", "traag", "traan", "trant", "trein", "trema", "trend", "troef", "troep", "trots", "trouw", "tucht", "twist", "uiten", "uniek", "uraan", "vaart", "vacht", "vader", "vakje", "varen", "vaten", "vazen", "veder", "vegen", "velen", "veren", "verse", "verte", "vezel", "villa", "vlaai", "vlees", "vlerk", "vlieg", "vlier", "vlies", "vlijt", "vloed", "vloei", "vloek", "vloer", "vocht", "voert", "vogel", "volgt", "voort", "voren", "vorig", "vorst", "vraag", "vrede", "vrees", "vroeg", "vrouw", "vuist", "vuren", "vurig", "waaks", "waard", "wafel", "wagen", "waken", "waker", "waren", "water", "wegen", "weide", "weken", "welig", "wenen", "wenkt", "weren", "werkt", "weven", "wezel", "wezen", "wijze", "winst", "woede", "woelt", "wonen", "woord", "worst", "wrang", "wrede", "wreef", "wreek", "zacht", "zadel", "zagen", "zakje", "zalig", "zebra", "zegel", "zegen", "zeker", "zenuw", "zetel", "zeven", "zoals", "zoekt", "zomer", "zonde", "zucht", "zuren", "zwaai", "zwaan", "zwaar", "zwart", "zweem", "zweep", "zweet", "zwerm", "zwoel"];
const WORDSET = new Set(WORDS);
const ROWS = 6, COLS = 5;
let answer = "", row = 0, col = 0, grid = [], done = false;

// ---- opslag (reeks & winst) ----
function loadStats(){
  try{ return JSON.parse(localStorage.getItem("woordje_stats")) || {streak:0,wins:0,played:0}; }
  catch(e){ return {streak:0,wins:0,played:0}; }
}
function saveStats(s){ try{ localStorage.setItem("woordje_stats", JSON.stringify(s)); }catch(e){} }
function renderStats(){
  const s = loadStats();
  document.getElementById("statline").textContent =
    "Reeks: " + s.streak + " · Gewonnen: " + s.wins + "/" + s.played;
}

// ---- opbouw bord ----
function buildGrid(){
  const g = document.getElementById("grid");
  g.innerHTML = "";
  grid = [];
  for(let r=0;r<ROWS;r++){
    const rowEl = document.createElement("div");
    rowEl.className = "row"; rowEl.dataset.r = r;
    const cells = [];
    for(let c=0;c<COLS;c++){
      const t = document.createElement("div");
      t.className = "tile";
      rowEl.appendChild(t);
      cells.push(t);
    }
    g.appendChild(rowEl);
    grid.push(cells);
  }
}

const LAYOUT = [
  "qwertyuiop".split(""),
  "asdfghjkl".split(""),
  ["enter",..."zxcvbnm".split(""),"del"]
];
const keyEls = {};
function buildKeyboard(){
  const kb = document.getElementById("keyboard");
  kb.innerHTML = "";
  LAYOUT.forEach(rowKeys=>{
    const kr = document.createElement("div");
    kr.className = "krow";
    rowKeys.forEach(k=>{
      const b = document.createElement("button");
      b.className = "key" + (k==="enter"||k==="del" ? " wide" : "");
      b.textContent = k==="del" ? "⌫" : (k==="enter" ? "Enter" : k);
      b.addEventListener("click", ()=>handleKey(k));
      kr.appendChild(b);
      if(k.length===1) keyEls[k] = b;
    });
    kb.appendChild(kr);
  });
}

function msg(text){
  const m = document.getElementById("msg");
  m.textContent = text;
  if(text){ clearTimeout(msg._t); msg._t = setTimeout(()=>{m.textContent="";}, 1800); }
}

function newGame(){
  answer = WORDS[Math.floor(Math.random()*WORDS.length)];
  row = 0; col = 0; done = false;
  buildGrid();
  Object.values(keyEls).forEach(b=>b.className = b.className.replace(/ (green|yellow|gray)/g,""));
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("msg").textContent = "";
  renderStats();
}

function handleKey(k){
  if(done) return;
  if(k==="enter"){ submit(); return; }
  if(k==="del"){ if(col>0){ col--; grid[row][col].textContent=""; grid[row][col].className="tile"; } return; }
  if(/^[a-z]$/.test(k) && col<COLS){
    grid[row][col].textContent = k;
    grid[row][col].className = "tile filled";
    col++;
  }
}

function submit(){
  if(col<COLS){ shake(); msg("Te weinig letters"); return; }
  let guess = grid[row].map(t=>t.textContent).join("");
  if(!WORDSET.has(guess)){ shake(); msg("Woord staat niet in de lijst"); return; }

  // kleuren bepalen (met dubbele letters correct)
  const res = Array(COLS).fill("gray");
  const counts = {};
  for(const ch of answer) counts[ch] = (counts[ch]||0)+1;
  for(let i=0;i<COLS;i++){ if(guess[i]===answer[i]){ res[i]="green"; counts[guess[i]]--; } }
  for(let i=0;i<COLS;i++){
    if(res[i]==="green") continue;
    if(counts[guess[i]]>0){ res[i]="yellow"; counts[guess[i]]--; }
  }
  for(let i=0;i<COLS;i++){
    grid[row][i].className = "tile " + res[i];
    const kb = keyEls[guess[i]];
    if(kb){
      if(res[i]==="green") kb.className = "key green";
      else if(res[i]==="yellow" && !kb.className.includes("green")) kb.className = "key yellow";
      else if(res[i]==="gray" && !kb.className.includes("green") && !kb.className.includes("yellow")) kb.className = "key gray";
    }
  }

  if(guess===answer){ finish(true); return; }
  row++; col=0;
  if(row>=ROWS){ finish(false); }
}

function shake(){ grid[row] && document.querySelectorAll(".row")[row].classList.add("shake");
  setTimeout(()=>document.querySelectorAll(".row")[row]?.classList.remove("shake"),400); }

function finish(win){
  done = true;
  const s = loadStats();
  s.played++;
  if(win){ s.wins++; s.streak++; } else { s.streak = 0; }
  saveStats(s); renderStats();
  const nums = ["","in 1!","in 2!","in 3","in 4","in 5","in 6"];
  setTimeout(()=>{
    document.getElementById("ovtitle").textContent = win ? "Goed geraden! 🎉" : "Jammer!";
    document.getElementById("ovsub").textContent = win ? ("Je had het " + nums[row+1]) : "Het woord was:";
    document.getElementById("ovanswer").textContent = win ? "" : answer;
    document.getElementById("overlay").classList.add("show");
  }, 500);
}

document.getElementById("again").addEventListener("click", newGame);
document.addEventListener("keydown", e=>{
  const k = e.key.toLowerCase();
  if(k==="enter") handleKey("enter");
  else if(k==="backspace") handleKey("del");
  else if(/^[a-z]$/.test(k)) handleKey(k);
});

buildKeyboard();
newGame();
</script>
