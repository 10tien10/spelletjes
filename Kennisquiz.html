<style>
  :root{
    --bg:#0d1b2a; --panel:#17293d; --text:#eef4fb; --muted:#8ea3ba;
    --accent:#2dd4bf; --accent2:#1b9e91; --good:#3fbf7f; --bad:#e15b5b; --border:#2b4258;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:linear-gradient(180deg,#0d1b2a,#0a1622); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:env(safe-area-inset-top) 16px env(safe-area-inset-bottom);
    height:100dvh; overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  header{width:100%; max-width:520px; text-align:center; padding:12px 0 6px;}
  header h1{margin:0; font-size:24px; letter-spacing:1px; font-weight:800;}
  .topbar{display:flex; justify-content:space-between; width:100%; max-width:520px;
    font-size:13px; color:var(--muted); margin-bottom:8px;}
  .topbar b{color:var(--text);}
  #progress{width:100%; max-width:520px; height:8px; background:var(--panel);
    border-radius:5px; overflow:hidden; margin-bottom:16px;}
  #progbar{height:100%; width:0%; background:var(--accent); transition:width .3s;}

  .stage{width:100%; max-width:520px; flex:1; display:flex; flex-direction:column; overflow:hidden;}
  .cat{display:inline-block; align-self:center; background:var(--panel); color:var(--accent);
    font-size:12px; font-weight:700; padding:4px 12px; border-radius:20px; margin-bottom:14px;}
  .question{font-size:21px; font-weight:700; line-height:1.35; text-align:center; margin-bottom:22px;}
  .answers{display:flex; flex-direction:column; gap:11px; overflow-y:auto; padding-bottom:6px;}
  .ans{
    background:var(--panel); border:2px solid var(--border); color:var(--text);
    border-radius:12px; padding:16px; font-size:16px; font-weight:600; text-align:left;
    cursor:pointer; transition:transform .06s, background .15s;
  }
  .ans:active{transform:scale(.99);}
  .ans.correct{background:var(--good); border-color:var(--good); color:#fff;}
  .ans.wrong{background:var(--bad); border-color:var(--bad); color:#fff;}
  .ans.dim{opacity:.5;}
  .ans:disabled{cursor:default;}

  .footer{width:100%; max-width:520px; padding:10px 0 6px; min-height:64px;}
  .btn{width:100%; padding:15px; border:none; border-radius:12px; font-size:17px;
    font-weight:700; cursor:pointer; background:var(--accent); color:#04201c;}
  .btn:active{filter:brightness(1.1);}
  .btn.ghost{background:var(--panel); color:var(--text);}

  .center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px;}
  .bigscore{font-size:46px; font-weight:800; color:var(--accent);}
  .rating{font-size:20px; font-weight:700;}
  .sub{color:var(--muted); font-size:15px;}
  .hidden{display:none !important;}
</style>
</head>

</div>
<div class="footer">

": "O-negatief", "w": ["AB-positief", "A-positief", "B-negatief"]}, {"c": "Algemeen", "q": "Hoeveel maanden van het jaar hebben minstens 28 dagen?", "a": "Alle 12", "w": ["1", "4", "7"]}, {"c": "Algemeen", "q": "Wat is de kleinste priemgetal?", "a": "2", "w": ["1", "3", "0"]}];
const ROUND = 10;
let quiz=[], idx=0, score=0, answered=false;

function getBest(){ try{return parseInt(localStorage.getItem("kennisquiz_best"))||0;}catch(e){return 0;} }
function setBest(v){ try{localStorage.setItem("kennisquiz_best",v);}catch(e){} }

function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startRound(){
  quiz = shuffle(ALL).slice(0, ROUND).map(item=>{
    const opts = shuffle([item.a, ...item.w]);
    return {c:item.c, q:item.q, a:item.a, opts};
  });
  idx=0; score=0; answered=false;
  document.getElementById("endscreen").classList.add("hidden");
  document.getElementById("quizscreen").classList.remove("hidden");
  document.getElementById("best").textContent = getBest();
  showQuestion();
}

function showQuestion(){
  answered=false;
  const item = quiz[idx];
  document.getElementById("qnum").textContent = "Vraag "+(idx+1)+"/"+ROUND;
  document.getElementById("score").textContent = score;
  document.getElementById("progbar").style.width = (idx/ROUND*100)+"%";
  document.getElementById("cat").textContent = item.c;
  document.getElementById("question").textContent = item.q;
  const box = document.getElementById("answers");
  box.innerHTML = "";
  item.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="ans"; b.textContent=opt;
    b.addEventListener("click",()=>choose(b, opt, item.a));
    box.appendChild(b);
  });
  document.getElementById("next").classList.add("hidden");
}

function choose(btn, opt, correct){
  if(answered) return;
  answered=true;
  const buttons = document.querySelectorAll(".ans");
  buttons.forEach(b=>{
    b.disabled=true;
    if(b.textContent===correct) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(opt===correct){ score++; document.getElementById("score").textContent=score; }
  const nb=document.getElementById("next");
  nb.textContent = (idx===ROUND-1) ? "Bekijk resultaat" : "Volgende";
  nb.classList.remove("hidden");
}

function next(){
  if(!answered) return;
  idx++;
  if(idx>=ROUND){ endRound(); return; }
  showQuestion();
}

function endRound(){
  document.getElementById("progbar").style.width="100%";
  document.getElementById("quizscreen").classList.add("hidden");
  document.getElementById("next").classList.add("hidden");
  document.getElementById("endscreen").classList.remove("hidden");
  document.getElementById("qnum").textContent = "Klaar!";
  document.getElementById("endscore").textContent = score+"/"+ROUND;
  const pct = score/ROUND*100;
  let r;
  if(pct===100) r="🏆 Perfect!";
  else if(pct>=80) r="⭐ Uitstekend";
  else if(pct>=60) r="👍 Goed gedaan";
  else if(pct>=40) r="🙂 Niet slecht";
  else r="💪 Volgende keer beter";
  document.getElementById("endrating").textContent = r;
  const b=getBest();
  if(score>b){ setBest(score); document.getElementById("endsub").textContent="Nieuw record! 🎉"; }
  else { document.getElementById("endsub").textContent="Je beste score: "+b+"/"+ROUND; }
  document.getElementById("best").textContent = getBest();
}

document.getElementById("next").addEventListener("click", next);
document.getElementById("restart").addEventListener("click", startRound);

startRound();
</script>
