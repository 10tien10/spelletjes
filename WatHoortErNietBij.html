  .topbar b{color:var(--text);}
  #progress{width:100%; max-width:520px; height:8px; background:var(--panel);
    border-radius:5px; overflow:hidden; margin-bottom:16px;}
  #progbar{height:100%; width:0%; background:var(--accent); transition:width .3s;}
  .stage{width:100%; max-width:520px; flex:1; display:flex; flex-direction:column; overflow-y:auto;}
  .question{font-size:21px; font-weight:700; line-height:1.4; text-align:center; margin:8px 0 22px;}
  .answers{display:flex; flex-direction:column; gap:11px;}
  .answers.two{flex-direction:row;}
  .answers.two .ans{flex:1; text-align:center; font-size:18px; padding:22px 8px;}
  .ans{
    background:var(--panel); border:2px solid var(--border); color:var(--text);
    border-radius:12px; padding:16px; font-size:17px; font-weight:600; text-align:left;
    cursor:pointer; transition:transform .06s, background .15s;
  }
  .ans:active{transform:scale(.99);}
  .ans.correct{background:var(--good); border-color:var(--good); color:#fff;}
  .ans.wrong{background:var(--bad); border-color:var(--bad); color:#fff;}
  .ans.dim{opacity:.45;}
  .ans:disabled{cursor:default;}
  .expl{margin-top:16px; background:var(--panel); border-left:3px solid var(--accent);
    border-radius:8px; padding:12px 14px; font-size:15px; color:var(--muted); line-height:1.45;}
  .expl.hidden{display:none;}
  .footer{width:100%; max-width:520px; padding:10px 0 6px; min-height:64px;}
  .btn{width:100%; padding:15px; border:none; border-radius:12px; font-size:17px;
    font-weight:700; cursor:pointer; background:var(--accent); color:var(--accentText);}
  .btn:active{filter:brightness(1.1);}
  .center{flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:10px;}
  .bigscore{font-size:46px; font-weight:800; color:var(--accent);}
  .rating{font-size:20px; font-weight:700;}
  .sub{color:var(--muted); font-size:15px;}
  .hidden{display:none !important;}
</style>
</head>
<body>
<header><h1>WAT HOORT ER NIET BIJ?</h1></header>
<div class="topbar">
  <span id="qnum">Vraag 1/10</span>
  <span>Score: <b id="score">0</b></span>
  <span>Beste: <b id="best">0</b></span>
</div>
<div id="progress"><div id="progbar"></div></div>

<div class="stage" id="quizscreen">
  <div class="question" id="question"></div>
  <div class="answers" id="answers"></div>
  <div class="expl hidden" id="expl"></div>
</div>
<div class="footer">
  <button class="btn hidden" id="next">Volgende</button>
</div>

<div class="stage hidden" id="endscreen">
  <div class="center">
    <div class="sub">Je score</div>
    <div class="bigscore" id="endscore">0/10</div>
    <div class="rating" id="endrating"></div>
    <div class="sub" id="endsub"></div>
    <button class="btn" id="restart" style="max-width:280px;margin-top:16px;">Nieuwe ronde</button>
  </div>
</div>

<script>
const ALL = [{"q": "Wat hoort er niet bij?", "a": "Wortel", "opts": ["Wortel", "Appel", "Banaan", "Peer"], "expl": "Wortel is een groente; de rest is fruit."}, {"q": "Wat hoort er niet bij?", "a": "Haai", "opts": ["Haai", "Hond", "Kat", "Cavia"], "expl": "Een haai is een vis; de rest zijn zoogdieren."}, {"q": "Wat hoort er niet bij?", "a": "Vierkant", "opts": ["Vierkant", "Rood", "Blauw", "Groen"], "expl": "Vierkant is een vorm; de rest zijn kleuren."}, {"q": "Wat hoort er niet bij?", "a": "Rotterdam", "opts": ["Rotterdam", "Amsterdam", "Parijs", "Berlijn"], "expl": "Rotterdam is geen hoofdstad; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Juli", "opts": ["Juli", "Maandag", "Woensdag", "Vrijdag"], "expl": "Juli is een maand; de rest zijn weekdagen."}, {"q": "Wat hoort er niet bij?", "a": "Eik", "opts": ["Eik", "Roos", "Tulp", "Narcis"], "expl": "Een eik is een boom; de rest zijn bloemen."}, {"q": "Wat hoort er niet bij?", "a": "Penseel", "opts": ["Penseel", "Piano", "Gitaar", "Viool"], "expl": "Een penseel is geen muziekinstrument."}, {"q": "Wat hoort er niet bij?", "a": "Zeven", "opts": ["Zeven", "Twee", "Vier", "Acht"], "expl": "Zeven is oneven; de rest zijn even getallen."}, {"q": "Wat hoort er niet bij?", "a": "Maan", "opts": ["Maan", "Mercurius", "Venus", "Mars"], "expl": "De maan is geen planeet; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Wolf", "opts": ["Wolf", "Leeuw", "Tijger", "Luipaard"], "expl": "Een wolf is geen katachtige; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Schaken", "opts": ["Schaken", "Voetbal", "Tennis", "Hockey"], "expl": "Schaken is een bordspel; de rest zijn balsporten."}, {"q": "Wat hoort er niet bij?", "a": "Januari", "opts": ["Januari", "Winter", "Lente", "Zomer"], "expl": "Januari is een maand; de rest zijn seizoenen."}, {"q": "Wat hoort er niet bij?", "a": "Diamant", "opts": ["Diamant", "Goud", "Zilver", "Brons"], "expl": "Diamant is geen metaal; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Pan", "opts": ["Pan", "Vork", "Mes", "Lepel"], "expl": "Een pan is geen bestek."}, {"q": "Wat hoort er niet bij?", "a": "Egypte", "opts": ["Egypte", "Spanje", "Italië", "Frankrijk"], "expl": "Egypte ligt niet in Europa; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Wind", "opts": ["Wind", "Regen", "Sneeuw", "Hagel"], "expl": "Wind is geen neerslag; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Spin", "opts": ["Spin", "Vlinder", "Bij", "Mier"], "expl": "Een spin is geen insect (acht poten)."}, {"q": "Wat hoort er niet bij?", "a": "Sahara", "opts": ["Sahara", "Nijl", "Amazone", "Rijn"], "expl": "De Sahara is een woestijn; de rest zijn rivieren."}, {"q": "Wat hoort er niet bij?", "a": "Aardappel", "opts": ["Aardappel", "Appel", "Peer", "Kers"], "expl": "Aardappel is een groente; de rest is fruit."}, {"q": "Wat hoort er niet bij?", "a": "Trommel", "opts": ["Trommel", "Trompet", "Fluit", "Saxofoon"], "expl": "Een trommel is een slaginstrument; de rest blaasinstrumenten."}, {"q": "Wat hoort er niet bij?", "a": "Beethoven", "opts": ["Beethoven", "Rembrandt", "Van Gogh", "Vermeer"], "expl": "Beethoven was componist; de rest waren schilders."}, {"q": "Wat hoort er niet bij?", "a": "Leeuw", "opts": ["Leeuw", "Koe", "Schaap", "Geit"], "expl": "Een leeuw is geen boerderijdier."}, {"q": "Wat hoort er niet bij?", "a": "Zon", "opts": ["Zon", "Mercurius", "Aarde", "Jupiter"], "expl": "De zon is een ster; de rest zijn planeten."}, {"q": "Wat hoort er niet bij?", "a": "Wiskunde", "opts": ["Wiskunde", "Nederlands", "Engels", "Frans"], "expl": "Wiskunde is geen taal; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Appel", "opts": ["Appel", "Hamer", "Zaag", "Schroevendraaier"], "expl": "Een appel is geen gereedschap."}, {"q": "Wat hoort er niet bij?", "a": "Groen", "opts": ["Groen", "Blauw", "Geel", "Rood"], "expl": "Groen is geen primaire kleur; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Bot", "opts": ["Bot", "Hart", "Lever", "Long"], "expl": "Een bot is geen orgaan; de rest wel."}, {"q": "Wat hoort er niet bij?", "a": "Boot", "opts": ["Boot", "Auto", "Fiets", "Trein"], "expl": "Een boot vaart over water; de rest rijdt over land."}, {"q": "Wat hoort er niet bij?", "a": "Walvis", "opts": ["Walvis", "Haring", "Zalm", "Tonijn"], "expl": "Een walvis is een zoogdier; de rest zijn vissen."}, {"q": "Wat hoort er niet bij?", "a": "Komkommer", "opts": ["Komkommer", "Aardbei", "Framboos", "Bosbes"], "expl": "Komkommer is een groente; de rest zijn bessen/fruit."}];
const STORE_KEY = "oddoneout_best";
const ROUND = Math.min(10, ALL.length);
let quiz=[], idx=0, score=0, answered=false;

function getBest(){ try{return parseInt(localStorage.getItem(STORE_KEY))||0;}catch(e){return 0;} }
function setBest(v){ try{localStorage.setItem(STORE_KEY,v);}catch(e){} }
function shuffle(a){ a=a.slice(); for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function startRound(){
  quiz = shuffle(ALL).slice(0, ROUND).map(it=>{
    const opts = it.opts.length>2 ? shuffle(it.opts) : it.opts.slice();
    return {q:it.q, a:it.a, opts, expl:it.expl};
  });
  idx=0; score=0;
  document.getElementById("endscreen").classList.add("hidden");
  document.getElementById("quizscreen").classList.remove("hidden");
  document.getElementById("best").textContent = getBest();
  showQuestion();
}

function showQuestion(){
  answered=false;
  const item = quiz[idx];
  document.getElementById("qnum").textContent = "Vraag "+(idx+1)+"/"+ROUND;
  document.getElementById("score").textContent = score;
  document.getElementById("progbar").style.width = (idx/ROUND*100)+"%";
  document.getElementById("question").textContent = item.q;
  const box = document.getElementById("answers");
  box.className = "answers" + (item.opts.length===2 ? " two" : "");
  box.innerHTML = "";
  item.opts.forEach(opt=>{
    const b=document.createElement("button");
    b.className="ans"; b.textContent=opt;
    b.addEventListener("click",()=>choose(b, opt, item));
    box.appendChild(b);
  });
  const ex=document.getElementById("expl"); ex.classList.add("hidden"); ex.textContent="";
  document.getElementById("next").classList.add("hidden");
}

function choose(btn, opt, item){
  if(answered) return;
  answered=true;
  document.querySelectorAll(".ans").forEach(b=>{
    b.disabled=true;
    if(b.textContent===item.a) b.classList.add("correct");
    else if(b===btn) b.classList.add("wrong");
    else b.classList.add("dim");
  });
  if(opt===item.a){ score++; document.getElementById("score").textContent=score; }
  const ex=document.getElementById("expl");
  ex.textContent = item.expl; ex.classList.remove("hidden");
  const nb=document.getElementById("next");
  nb.textContent = (idx===ROUND-1) ? "Bekijk resultaat" : "Volgende";
  nb.classList.remove("hidden");
  nb.scrollIntoView({behavior:"smooth", block:"nearest"});
}

function next(){
  if(!answered) return;
  idx++;
  if(idx>=ROUND){ endRound(); return; }
  showQuestion();
}

function endRound(){
  document.getElementById("progbar").style.width="100%";
  document.getElementById("quizscreen").classList.add("hidden");
  document.getElementById("next").classList.add("hidden");
  document.getElementById("endscreen").classList.remove("hidden");
  document.getElementById("qnum").textContent = "Klaar!";
  document.getElementById("endscore").textContent = score+"/"+ROUND;
  const pct = score/ROUND*100;
  let r;
  if(pct===100) r="🏆 Perfect!";
  else if(pct>=80) r="⭐ Uitstekend";
  else if(pct>=60) r="👍 Goed gedaan";
  else if(pct>=40) r="🙂 Niet slecht";
  else r="💪 Volgende keer beter";
  document.getElementById("endrating").textContent = r;
  const b=getBest();
  if(score>b){ setBest(score); document.getElementById("endsub").textContent="Nieuw record! 🎉"; }
  else { document.getElementById("endsub").textContent="Je beste score: "+b+"/"+ROUND; }
  document.getElementById("best").textContent = getBest();
}

document.getElementById("next").addEventListener("click", next);
document.getElementById("restart").addEventListener("click", startRound);
startRound();
</script>
</body>
</html>
