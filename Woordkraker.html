<title>Woordkraker</title>
<style>
  :root{
    --bg:#12121c; --panel:#1c1c2b; --tile:#f4c95d; --tiletext:#2a2410;
    --text:#eef2f8; --muted:#9aa0b4; --accent:#7c5cff; --good:#4caf7d; --border:#2e2e44;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; height:100%;}
  body{
    background:var(--bg); color:var(--text);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    display:flex; flex-direction:column; align-items:center;
    padding:env(safe-area-inset-top) 10px env(safe-area-inset-bottom);
    height:100dvh; overflow:hidden; user-select:none; -webkit-user-select:none;
  }
  header{width:100%; max-width:520px; text-align:center; padding:8px 0 4px;}
  header h1{margin:0; font-size:22px; letter-spacing:2px; font-weight:800;}
  .scorebar{display:flex; justify-content:space-between; width:100%; max-width:520px;
    font-size:13px; color:var(--muted); margin:4px 0 6px; padding:0 2px;}
  .scorebar b{color:var(--text); font-size:15px;}
  #progress{width:100%; max-width:520px; height:8px; background:var(--panel);
    border-radius:5px; overflow:hidden; margin-bottom:8px;}
  #progbar{height:100%; width:0%; background:var(--accent); transition:width .3s;}
  #rating{text-align:center; font-size:13px; color:var(--accent); font-weight:700; min-height:16px; margin-bottom:6px;}

  #wordline{
    height:52px; display:flex; align-items:center; justify-content:center; gap:6px;
    margin-bottom:10px; min-height:52px;
  }
  #wordline .wt{
    width:38px; height:46px; background:var(--panel); border:1px solid var(--border);
    border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:24px; font-weight:800; text-transform:uppercase;
  }
  #msg{min-height:20px; font-size:14px; font-weight:700; margin-bottom:6px; text-align:center;}
  .msg-good{color:var(--good);} .msg-bad{color:#e06c6c;}

  #rack{display:flex; gap:8px; justify-content:center; flex-wrap:wrap; margin-bottom:14px;}
  .tile{
    width:52px; height:56px; background:var(--tile); color:var(--tiletext);
    border-radius:10px; display:flex; align-items:center; justify-content:center;
    font-size:28px; font-weight:800; text-transform:uppercase; cursor:pointer;
    box-shadow:0 3px 0 #b8912f; transition:transform .08s, opacity .15s;
  }
  .tile:active{transform:translateY(2px);}
  .tile.used{opacity:.25; pointer-events:none; box-shadow:none;}

  .controls{display:flex; gap:8px; width:100%; max-width:520px; margin-bottom:12px;}
  .btn{flex:1; padding:13px 0; border:none; border-radius:10px; font-size:15px;
    font-weight:700; cursor:pointer; background:var(--panel); color:var(--text);}
  .btn:active{filter:brightness(1.3);}
  .btn.primary{background:var(--accent); color:#fff;}
  .btn.small{flex:0 0 52px; font-size:20px;}

  #foundwrap{width:100%; max-width:520px; flex:1; overflow:hidden; display:flex; flex-direction:column;}
  #foundwrap h3{margin:0 0 6px; font-size:13px; color:var(--muted); font-weight:600;}
  #found{flex:1; overflow-y:auto; display:flex; flex-wrap:wrap; gap:6px; align-content:flex-start;
    padding:2px; -webkit-overflow-scrolling:touch;}
  .fw{background:var(--panel); border:1px solid var(--border); border-radius:6px;
    padding:5px 9px; font-size:14px; text-transform:uppercase; letter-spacing:1px;}
  .fw.rev{opacity:.55; border-style:dashed; color:var(--muted);}
  .fw b{color:var(--accent); font-size:11px; margin-left:5px;}

  .bottombar{display:flex; gap:8px; width:100%; max-width:520px; padding:8px 0 4px;}

  #overlay{position:fixed; inset:0; background:rgba(8,8,14,.9); display:none;
    align-items:center; justify-content:center; z-index:20; padding:16px;}
  #overlay.show{display:flex;}
  .card{background:var(--panel); border:1px solid var(--border); border-radius:16px;
    padding:22px; text-align:center; max-width:340px; width:100%; max-height:86vh; overflow-y:auto;}
  .card h2{margin:0 0 4px; font-size:22px;}
  .card p{margin:6px 0; color:var(--muted); font-size:14px;}
  .card .big{font-size:30px; font-weight:800; color:var(--accent); margin:4px 0;}
</style>
</head>
<body>
<header><h1>WOORDKRAKER</h1></header>
<div class="scorebar">
  <span>Score: <b id="score">0</b></span>
  <span>Gevonden: <b id="count">0</b> / <span id="total">0</span></span>
  <span>Beste: <b id="best">0</b></span>
</div>
<div id="progress"><div id="progbar"></div></div>
<div id="rating"></div>

<div id="wordline"></div>
<div id="msg"></div>
<div id="rack"></div>

<div class="controls">
  <button class="btn small" id="del">⌫</button>
  <button class="btn primary" id="enter">Invoeren</button>
  <button class="btn small" id="shuffle">⇄</button>
  <button class="btn small" id="clear">✕</button>
</div>

<div id="foundwrap">
  <h3>Gevonden woorden</h3>
  <div id="found"></div>
</div>

<div class="bottombar">
  <button class="btn" id="reveal">Toon gemiste woorden</button>
  <button class="btn primary" id="newgame">Nieuwe puzzel</button>
</div>

<div id="overlay">
  <div class="card">
    <h2 id="ovtitle">Resultaat</h2>
    <div class="big" id="ovscore"></div>
    <p id="ovsub"></p>
    <button class="btn primary" id="ovnew" style="margin-top:12px;">Nieuwe puzzel</button>
  </div>

const PTS = {3:1,4:2,5:4,6:7,7:12};

let base="", rack=[], selected=[], solutions=[], found=new Set(), score=0, maxScore=0, revealed=false;

function bestKey(){ return "woordkraker_best"; }
function getBest(){ try{return parseInt(localStorage.getItem(bestKey()))||0;}catch(e){return 0;} }
function setBest(v){ try{localStorage.setItem(bestKey(), v);}catch(e){} }

function shuffleArr(a){ for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]];} return a; }

function canForm(word, letters){
  const pool = {};
  for(const c of letters) pool[c]=(pool[c]||0)+1;
  for(const c of word){ if(!pool[c]) return false; pool[c]--; }
  return true;
}

function computeSolutions(){
  const letters = base.split("");
  solutions = [];
  for(const w of DICT){ if(w.length<=7 && canForm(w, letters)) solutions.push(w); }
  maxScore = solutions.reduce((s,w)=>s+(PTS[w.length]||0),0);
}

function newGame(){
  base = PUZZLES[Math.floor(Math.random()*PUZZLES.length)];
  rack = shuffleArr(base.split("")).map((ch,i)=>({ch, used:false}));
  selected = []; found = new Set(); score = 0; revealed=false;
  computeSolutions();
  document.getElementById("total").textContent = solutions.length;
  document.getElementById("best").textContent = getBest();
  document.getElementById("overlay").classList.remove("show");
  document.getElementById("found").innerHTML = "";
  render(); updateScore(); msg("");
}

function render(){
  const wl = document.getElementById("wordline");
  wl.innerHTML = "";
  selected.forEach(i=>{
    const d=document.createElement("div"); d.className="wt"; d.textContent=rack[i].ch; wl.appendChild(d);
  });
  const r = document.getElementById("rack");
  r.innerHTML = "";
  rack.forEach((t,i)=>{
    const d=document.createElement("div");
    d.className="tile"+(t.used?" used":"");
    d.textContent=t.ch;
    d.addEventListener("click",()=>pick(i));
    r.appendChild(d);
  });
}

function pick(i){ if(rack[i].used) return; rack[i].used=true; selected.push(i); render(); }
function backspace(){ const i=selected.pop(); if(i!==undefined){ rack[i].used=false; render(); } }
function clearSel(){ selected.forEach(i=>rack[i].used=false); selected=[]; render(); }
function shuffleRack(){ clearSel(); shuffleArr(rack); render(); }

function msg(text, good){
  const m=document.getElementById("msg");
  m.textContent=text; m.className = good===true?"msg-good":(good===false?"msg-bad":"");
  if(text){ clearTimeout(msg._t); msg._t=setTimeout(()=>{m.textContent="";m.className="";},1500); }
}

function updateScore(){
  document.getElementById("score").textContent = score;
  document.getElementById("count").textContent = found.size;
  const pct = maxScore? Math.round(score/maxScore*100):0;
  document.getElementById("progbar").style.width = pct+"%";
  let r="";
  if(pct>=100) r="🏆 Meester! Alles gevonden!";
  else if(pct>=75) r="⭐ Expert";
  else if(pct>=50) r="👍 Knap bezig";
  else if(pct>=25) r="🙂 Goed op weg";
  document.getElementById("rating").textContent = r;
  const b=getBest(); if(score>b){ setBest(score); document.getElementById("best").textContent=score; }
}

function addFound(word, isRev){
  const el=document.createElement("div");
  el.className="fw"+(isRev?" rev":"");
  el.innerHTML = word + "<b>+"+(PTS[word.length]||0)+"</b>";
  document.getElementById("found").prepend(el);
}

function submit(){
  const word = selected.map(i=>rack[i].ch).join("");
  clearSel();
  if(word.length<3){ msg("Minstens 3 letters", false); return; }
  if(found.has(word)){ msg("Al gevonden", false); return; }
  if(!DICT.has(word)){ msg("Geen bekend woord", false); return; }
  // (formeerbaarheid is gegarandeerd omdat letters uit het rack komen)
  found.add(word);
  score += (PTS[word.length]||0);
  addFound(word,false);
  msg("+"+(PTS[word.length]||0)+" punten!", true);
  updateScore();
  if(found.size===solutions.length) finish();
}

function reveal(){
  if(revealed) return;
  revealed=true;
  solutions.filter(w=>!found.has(w)).sort((a,b)=>b.length-a.length).forEach(w=>addFound(w,true));
  finish();
}

function finish(){
  const pct = maxScore? Math.round(score/maxScore*100):0;
  document.getElementById("ovscore").textContent = score + " punten";
  document.getElementById("ovsub").textContent =
    "Je vond " + found.size + " van de " + solutions.length + " woorden (" + pct + "%).";
  document.getElementById("ovtitle").textContent = pct>=100 ? "Perfect! 🏆" : "Ronde klaar";
  document.getElementById("overlay").classList.add("show");
}

document.getElementById("del").addEventListener("click", backspace);
document.getElementById("enter").addEventListener("click", submit);
document.getElementById("shuffle").addEventListener("click", shuffleRack);
document.getElementById("clear").addEventListener("click", clearSel);
document.getElementById("reveal").addEventListener("click", reveal);
document.getElementById("newgame").addEventListener("click", newGame);
document.getElementById("ovnew").addEventListener("click", newGame);

document.addEventListener("keydown", e=>{
  const k=e.key.toLowerCase();
  if(k==="enter"){ submit(); }
  else if(k==="backspace"){ backspace(); }
  else if(/^[a-z]$/.test(k)){
    const i=rack.findIndex(t=>!t.used && t.ch===k);
    if(i>=0) pick(i);
  }
});

newGame();
</script>
